version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: nexahome-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nexahome
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - nexahome-network

  redis:
    image: redis:7-alpine
    container_name: nexahome-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - nexahome-network

  minio:
    image: minio/minio:RELEASE.2023-05-18T00-05-36Z
    container_name: nexahome-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data
    networks:
      - nexahome-network

volumes:
  pgdata:
  redisdata:
  miniodata:

networks:
  nexahome-network:
    driver: bridge
